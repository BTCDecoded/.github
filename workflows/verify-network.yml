name: Verify Network Protocol (Formal Verification)

on: 
  push:
    branches: [ main, develop ]
    paths:
      - 'blvm-node/**'
      - '.github/workflows/verify-network.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'blvm-node/**'
      - '.github/workflows/verify-network.yml'

jobs:
  verify-network:
    name: Network Protocol Verification
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        

      - name: Strip [patch.crates-io] for crates.io-only CI
        uses: BTCDecoded/rust-ci/strip-patch-crates-io@main
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain-file: rust-toolchain.toml
          components: rustfmt, clippy
          
      - name: Cache cargo dependencies
        uses: actions/cache@v3
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            blvm-node/target
          key: ${{ runner.os }}-cargo-network-${{ hashFiles('**/Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-network-

      # === REQUIRED: MUST PASS ===
      
      - name: Unit & Property Tests
        working-directory: blvm-node
        run: |
          cargo test --all-features --verbose
          echo "✅ All unit and property tests passed"
          
      - name: blvm-spec-lock Verification
        working-directory: blvm-node
        run: |
          # Run blvm-spec-lock verification
          cargo spec-lock verify --verbose
          echo "✅ All network protocol blvm-spec-lock proofs verified"
          
      - name: Clippy Linting
        working-directory: blvm-node
        run: |
          cargo clippy --all-features -- -D warnings
          echo "✅ Clippy linting passed"
          
      - name: Rustfmt Formatting
        working-directory: blvm-node
        run: |
          cargo fmt --all -- --check
          echo "✅ Code formatting verified"

      # === VERIFICATION SUMMARY ===
      
      - name: Verification Summary
        run: |
          echo "🎯 NETWORK PROTOCOL VERIFICATION COMPLETE"
          echo "======================================"
          echo "✅ Unit tests: PASSED"
          echo "✅ Property tests: PASSED" 
            echo "✅ blvm-spec-lock proofs: VERIFIED"
          echo "✅ Clippy linting: PASSED"
          echo "✅ Code formatting: VERIFIED"
          echo ""
          echo "This PR meets all formal verification requirements."
          echo "Network protocol code is mathematically verified."

